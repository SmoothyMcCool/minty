<li class="folder-item" [class.selected]="node === selected">
	<span *ngIf="node.type === 'Folder'" class="folder-toggle" (click)="toggle()">
		<i class="bi" [ngClass]="{'bi-folder': isExpanded, 'bi-folder2': !isExpanded}"></i>
	</span>

	<span class="clickable-text" (click)="onSelect(node)">
		{{getFileName(node.path)}}
	</span>

	<span class="flex-grow-1"></span>

	<button class="btn btn-sm" style="font-size: 14px;" (click)="editNodeInfo(); onSelect(node)">
		<i class="bi bi-pencil-square"></i>
	</button>
	<button type="button" class="btn btn-sm p-0" style="font-size: 14px; color: red" (click)="deleteNode()">
		<i class="bi bi-trash3"></i>
	</button>
</li>

<ul *ngIf="node.type === 'Folder' && isExpanded" class="list-unstyled ps-3">
	<ng-container *ngFor="let child of childNodesOf(node.path)">
		<minty-project-node [node]="child" [selected]="selected" [nodes]="nodes" (nodeSelected)="onSelect($event)"
			(update)="update.emit($event)" (delete)="delete.emit($event)">
		</minty-project-node>
	</ng-container>
</ul>

<div class="modal show d-block" tabindex="-1" *ngIf="editNodeInfoVisible">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">Edit Project Entry</h5>
				<button type="button" class="btn-close" (click)="onCancelEditNodeInfo()" aria-label="Close"></button>
			</div>
			<div class="modal-body">
				<form role="form row">
					<div class="col-12">
						<label for="nameInput" class="form-label">Name</label>
						<input type="text" class="form-control" id="nameInput" name="nameInput" [(ngModel)]="editName" required>
					</div>
					<div class="col" *ngIf="editNodeType === 'File'">
						<label for="fileTypeSelect" class="form-label">File Type</label>
						<select class="form-select" id="fileTypeSelect" [(ngModel)]="editFileType" name="fileTypeSelect" required>
							<option>code</option>
							<option>markdown</option>
							<option>json</option>
							<option>text</option>
							<option>diagram</option>
						</select>
					</div>
					<div class="col">
						<label for="typeSelect" class="form-label">Parent</label>
						<select class="form-select" id="typeSelect" [(ngModel)]="editParent" name="parentSelect" required>
							<option *ngFor="let folder of listFolders()">{{folder.path}}</option>
						</select>
					</div>
				</form>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary" (click)="onCancelEditNodeInfo()"><i class="bi bi-arrow-counterclockwise"></i></button>
				<button type="button" class="btn btn-primary" (click)="onConfirmNodeInfo()"><i class="bi bi-check-lg"></i></button>
			</div>
		</div>
	</div>
</div>
