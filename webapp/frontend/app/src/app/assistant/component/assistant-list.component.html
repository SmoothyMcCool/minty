<div class="row mb-2">
	<form>
		<div class="form-group well mb-2 p-2">
			<label class="" for="assistantFilter">Filter</label>
			<input type="text" class="form-control mb-2" id="assistantFilter" name="assistantFilter"
				[(ngModel)]="assistantFilter">
			<div class="form-check form-switch">
				<input class="form-check-input" type="checkbox" id="ownedAssistantsSwitch"
					name="ownedAssistantsSwitch" [(ngModel)]="onlyOwnedAssistants">
				<label class="form-check-label" for="ownedAssistantsSwitch">Show only my assistants</label>
			</div>
		</div>
	</form>
	<h4>Assistants</h4>
	@if (assistants.length > 0) {
		<ul class="list-group py-0">
			@for (assistant of filteredAssistants(); track assistant.id) {
				<li class="list-group-item list-group-item-action px-2 position-relative text-bg-light py-0" style="height: 2.5rem">

					<div class="d-flex align-items-center h-100 w-100 overflow-hidden">
						<span class="clickable-text text-truncate flex-grow-1" (click)="startConversation(assistant)" stlye="min-width: 0;">
							{{assistant.name}}
						</span>
						<span class="badge text-bg-secondary flex-shrink-0 ms-2">
							{{assistant.model}}
						</span>

						@if (isOwned(assistant)) {
							<button class="btn btn-sm p-0 flex-shrink-0 ms-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
								<i class="bi bi-three-dots-vertical" style="font-size: 18px;"></i>
							</button>
							<ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownMenuButton">
								<li>
									<button class="dropdown-item" type="button" (click)="editAssistant(assistant.id)">
										<i class="bi bi-pencil-square me-2"></i> Edit
									</button>
								</li>
								<li>
									<button class="dropdown-item" type="button" (click)="shareAssistant(assistant)">
										<i class="bi bi-share me-2"></i> Share
									</button>
								</li>
								<li><hr class="dropdown-divider"></li>
								<li>
									<button class="dropdown-item text-danger" type="button"
										[disabled]="deleteInProgress" (click)="deleteAssistant(assistant)">
										<i class="bi bi-trash me-2"></i> Delete
									</button>
								</li>
							</ul>
						}
					</div>
				</li>
			}
		</ul>
	} @else {
		<p class="font-monospace ms-4">If you had any assistants they would be listed here.</p>
	}
</div>

<minty-confirmation-dialog [title]="'Delete Assistant'" [message]="'Are you sure you want to delete this Assistant?'"
	[visible]="confirmDeleteAssistantVisible" (confirm)="confirmDeleteAssistant()"
	(cancel)="confirmDeleteAssistantVisible = false">
</minty-confirmation-dialog>

<minty-user-select-dialog [visible]="userSelectDialogVisible" (confirm)="onUsersConfirmed($event)"
	[initialSelection]="sharingSelection" (cancel)="userSelectDialogVisible = false">
</minty-user-select-dialog>
