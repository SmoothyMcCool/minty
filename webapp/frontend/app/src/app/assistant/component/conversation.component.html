@if (showChatOptions) {
	<div class="row m-1">
		<div class="col-auto">
			<div class="form-check form-switch">
				<input class="form-check-input" type="checkbox" id="renderDiagramsSwitch" [(ngModel)]="useMermaid">
				<label class="form-check-label" for="renderDiagramsSwitch">Render Diagrams</label>
			</div>
		</div>
		<div class="col-auto">
			<div class="form-check form-switch">
				<input class="form-check-input" type="checkbox" id="useMarkdownSwitch" [(ngModel)]="useMarkdown">
				<label class="form-check-label" for="useMarkdownSwitch">Render Markdown</label>
			</div>
		</div>
	</div>
}
<div [class.chat-container]="oldestMessagesFirst">
	@for (message of messages; track trackByMessage(messageIndex, message); let messageIndex = $index) {
		<minty-chat-message [message]="message" [useMarkdown]="useMarkdown" [useMermaid]="useMermaid"
			[isFirst]="messageIndex === 0" [responsePending]="responsePending" [responseComplete]="responseComplete"
			[queueDepth]="queueDepth"></minty-chat-message>
	}
</div>
