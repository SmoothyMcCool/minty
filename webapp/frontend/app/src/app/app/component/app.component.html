<div class="container-fluid">
	<div class="container-top">

		<!-- SUCCESS -->
		<div class="alert alert-primary" *ngIf="alerts.success.length > 0" @alertAnim>
			<strong *ngFor="let alert of alerts.success">{{alert}}</strong>
		</div>

		<!-- INFO -->
		<div class="alert alert-info" *ngIf="alerts.info.length > 0" @alertAnim>
			<strong *ngFor="let alert of alerts.info">{{alert}}</strong>
		</div>

		<!-- FAILURE -->
		<div class="alert alert-danger" *ngIf="alerts.failure.length > 0" @alertAnim>
			<div class="row mb-3 mb-0">
				<div class="col me-auto align-middle">
					<div class="row" *ngFor="let alert of alerts.failure">
						<label class="col-form-label">
							<strong>Oh no!&nbsp;</strong>
							<span>
								<pre [innerHTML]="alert"></pre>
							</span>
						</label>
					</div>
				</div>
				<div class="col-auto">
					<button class="btn btn-danger" (click)="hideError()">
						Dismiss
					</button>
				</div>
			</div>
		</div>
	</div>
</div>
