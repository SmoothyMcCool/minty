<div class="modal-backdrop fade show" *ngIf="visible"></div>
<div class="modal show d-block" tabindex="-1" *ngIf="visible" (click)="$event.stopPropagation()">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">Select Users</h5>
				<button type="button" class="btn-close" (click)="onCancel()" aria-label="Close"></button>
			</div>
			<div class="modal-body">
				<div class="mb-2">
					<button type="button" class="btn btn-outline-secondary btn-sm" (click)="onSelectAll()"
						[class.active]="allSelected">
						<i class="bi bi-people-fill"></i> All Users
					</button>
				</div>
				<div class="list-group">
					<button *ngFor="let user of users.slice().sort()" type="button" class="list-group-item list-group-item-action"
						[class.active]="!allSelected && isSelected(user)" [disabled]="allSelected"
						(click)="onToggleUser(user)">
						{{ user }}
					</button>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary" (click)="onCancel()">
					<i class="bi bi-x-lg"></i>
				</button>
				<button type="button" class="btn btn-primary" (click)="onConfirm()">
					<i class="bi bi-check-lg"></i>
				</button>
			</div>
		</div>
	</div>
</div>
