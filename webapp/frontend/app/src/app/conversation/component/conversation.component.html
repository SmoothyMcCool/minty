<!-- Settings Toolbar: Styled as a subtle, modern utility bar -->
@if (showChatOptions) {
	<div class="chat-settings-bar mb-3 p-2 bg-light border rounded-3 d-flex flex-wrap gap-3 align-items-center shadow-sm">
		<div class="d-flex align-items-center gap-2 px-2 border-end">
			<i class="bi bi-sliders text-muted small"></i>
			<span class="text-uppercase fw-bold small text-secondary" style="font-size: 0.7rem; letter-spacing: 0.5px;">Chat Options</span>
		</div>

		<div class="form-check form-switch mb-0">
			<input class="form-check-input" type="checkbox" id="renderDiagramsSwitch" [(ngModel)]="useMermaid">
			<label class="form-check-label small text-dark" for="renderDiagramsSwitch">Diagrams</label>
		</div>

		<div class="form-check form-switch mb-0">
			<input class="form-check-input" type="checkbox" id="useMarkdownSwitch" [(ngModel)]="useMarkdown">
			<label class="form-check-label small text-dark" for="useMarkdownSwitch">Markdown</label>
		</div>
	</div>
}

<!-- The Message Stream -->
<div [class.chat-container]="oldestMessagesFirst" class="chat-stream-container">
	@for (message of messages; track message.id; let messageIndex = $index) {
		<minty-chat-message
			[message]="message"
			[useMarkdown]="useMarkdown"
			[useMermaid]="useMermaid"
			[isFirst]="messageIndex === 0"
			[responsePending]="responsePending"
			[responseComplete]="responseComplete"
			[queueDepth]="queueDepth">
		</minty-chat-message>
	}
</div>
