@if (!projectMode) {
	<form>
		<div class="form-check">
			<input class="form-check-input" type="radio" name="orderLastUsed" id="orderLastUsed"
				[(ngModel)]="conversationSortOrder" value="lastUsed" (ngModelChange)="sortConversationsBy('lastUsed')">
			<label class="form-check-label" for="orderLastUsed">
				Order by Last Used
			</label>
		</div>
		<div class="form-check">
			<input class="form-check-input" type="radio" name="orderAlphabetical" id="orderAlphabetical"
				[(ngModel)]="conversationSortOrder" value="alpha" (ngModelChange)="sortConversationsBy('alpha')">
			<label class="form-check-label" for="orderAlphabetical">
				Order A-Z
			</label>
		</div>
	</form>
}

<ul class="list-group py-0">
	@for (conversation of conversations; track conversation.id) {
		<li [style.height]="projectMode ? null : '2.5rem'"
			[class.list-group-item]="!projectMode"
			[class.list-group-item-action]="!projectMode"
			[class.list-unstyled]="projectMode"
			[class.px-0]="projectMode"
			[class.px-2]="!projectMode"
			[class.small]="projectMode" class="folder-item position-relative text-bg-light py-0">

			<div class="d-flex align-items-center h-100 w-100 overflow-hidden">
				<span class="clickable-text text-truncate flex-grow-1" (click)="selectConversation(conversation)" stlye="min-width: 0;">
					{{getConversationTitle(conversation)}}
				</span>
				<span class="badge text-bg-secondary flex-shrink-0 ms-2">
					{{getConversationAssistantName(conversation)}}
				</span>


				<button class="btn btn-sm p-0 flex-shrink-0 ms-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
					<i class="bi bi-three-dots-vertical" style="font-size: 18px;"></i>
				</button>
				<ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownMenuButton">
					<li>
						<button class="dropdown-item" type="button" (click)="renameConversation(conversation)">
							<i class="bi bi-pencil-square me-2"></i> Rename
						</button>
					</li>
					<li>
						<hr class="dropdown-divider">
					</li>
					<li>
						<button class="dropdown-item text-danger" type="button" [disabled]="deleteInProgress"
							(click)="deleteConversation(conversation)">
							<i class="bi bi-trash me-2"></i> Delete
						</button>
					</li>
				</ul>
			</div>
		</li>
	}
</ul>

<minty-confirmation-dialog [title]="'Delete Conversation'"
	[message]="'Are you sure you want to delete this Conversation?'" [visible]="confirmDeleteConversationVisible"
	(confirm)="confirmDeleteConversation()" (cancel)="confirmDeleteConversationVisible = false">
</minty-confirmation-dialog>

@if (renameConversationVisible) {
	<div class="modal show d-block" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">What's the new Title?</h5>
					<button type="button" class="btn-close" (click)="onCancel()" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<input class="form-control" type="text" name="conversationName" maxlength="50"
						[(ngModel)]="renamedConversationTitle">
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" (click)="onCancelConversationRename()">
						<i class="bi bi-x-lg"></i>
					</button>
					<button type="button" class="btn btn-primary" (click)="onConfirmConversationRename()">
						<i class="bi bi-check-lg"></i>
					</button>
				</div>
			</div>
		</div>
	</div>
}
