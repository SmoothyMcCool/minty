@if (task) {
	<div class="mb-2">
		<div class="row">
			<div class="col-auto">
				<h5>{{task.taskName}}</h5>
				<div class="d-flex align-items-center gap-2">
					<select class="form-select bg-opacity-75" name="taskName" [ngModel]="task.taskName"
						(ngModelChange)="changeTask($event)">
						@for (name of taskNames; track name) {
							<option value="{{name}}">{{name}}</option>
						}
					</select>
					<button class="btn btn-outline" type="button" (click)="showTaskDescription()">
						<i class="bi bi-question-circle"></i>
					</button>
				</div>
			</div>
			@if (taskDescription) {
				<div class="col" [innerHTML]="taskDescription">
				</div>
			}
		</div>
	</div>
}
@if (task) {
	<form>
		<div class="mb-3">
			<label for="stepName" class="fs-4">Step Name</label>
			<input [type]="text" class="form-control form-control-sm" id="stepName" name="stepName"
				[ngModel]="task.stepName" (ngModelChange)="onStepNameChanged($event)">
		</div>
		<div class="mb-3">
			<div class="form-check">
				<input type="checkbox" class="form-check-input" id="isLoggingActive" name="isLoggingActive"
					[ngModel]="task.loggingActive" (ngModelChange)="onLoggingActiveChange($event)">
				<label for="isLoggingActive" class="form-check-label">Log Task Output</label>
			</div>
		</div>
		<h5>Attributes</h5>
		<minty-attribute-map-editor [ngModel]="configForEditor" (ngModelChange)="onConfigurationChanged($event)"
			[taskSpecification]="taskSpecification" name="{{task.taskName}}-taskConfig"></minty-attribute-map-editor>
	</form>
}
