<div *ngIf="task" class="mb-2">
	<div class="row">
		<div class="col-auto">
			<h5>{{task.taskName}}
				<button class="btn btn-outline"
				type="button"
				(click)="showTaskDescription()">
				<i class="bi bi-question-circle"></i>
			</button>
			</h5>
		</div>
		<div *ngIf="taskDescription" class="col" [innerHTML]="taskDescription">
		</div>
	</div>

</div>
<ng-container *ngIf="task">
	<form>
		<div class="mb-3">
			<label for="stepName" class="fs-4">Step Name</label>
			<input [type]="text" class="form-control form-control-sm" id="stepName" name="stepName"
				[ngModel]="task.stepName" (ngModelChange)="onStepNameChanged($event)">
		</div>
		<div class="mb-3">
			<div class="form-check">
				<input type="checkbox" class="form-check-input" id="isLoggingActive" name="isLoggingActive"
					[ngModel]="task.loggingActive" (ngModelChange)="onLoggingActiveChange($event)">
				<label for="isLoggingActive" class="form-check-label">Log Task Output</label>
			</div>
		</div>
		<minty-attribute-map-editor
			[ngModel]="configForEditor"
			(ngModelChange)="onConfigurationChanged($event)"
			[taskSpecification]="taskSpecification"
			name="{{task.taskName}}-taskConfig"></minty-attribute-map-editor>
	</form>
</ng-container>
