<div class="modal-backdrop fade show" *ngIf="visible"></div>

<div class="modal fade show d-block" *ngIf="visible">
	<div class="modal-dialog modal-xl modal-dialog-scrollable">
		<div class="modal-content">

			<div class="modal-header">
				<h5 class="modal-title">Edit Task</h5>
				<button class="btn-close" (click)="cancelEdit()"></button>
			</div>

			<div class="modal-body">
				<minty-task-editor [(ngModel)]="editedTask" [taskSpecification]="specification"
					(taskNameChanged)="onTaskNameChanged($event)">
				</minty-task-editor>
			</div>

			<div class="modal-footer">
				<button class="btn btn-danger me-auto" (click)="deleteStep()">Delete</button>
				<button class="btn btn-secondary" (click)="cancelEdit()">Cancel</button>
				<button class="btn btn-primary" (click)="done()">Done</button>
			</div>

		</div>
	</div>
</div>

<minty-confirmation-dialog [title]="'Delete Step'" [message]="'Are you sure you want to delete this step?'"
	[visible]="confirmDeleteStepVisible" (confirm)="confirmDeleteStep()"
	(cancel)="confirmDeleteStepVisible = false"></minty-confirmation-dialog>
