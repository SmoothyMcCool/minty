@if (visible) {
	<div class="node-palette-backdrop" (click)="closed.emit()">
	</div>
}

@if (visible) {
	<div class="node-palette" (keydown)="onKeyDown($event)">
		<input #searchInput class="form-control mb-2" placeholder="Search nodes..." [(ngModel)]="search"
			(ngModelChange)="onSearchChange()">
		<div class="node-list">
			@for (group of groupedNodes; track group.group) {
				<div>
					<h6 class="mt-3 border-bottom pb-1">
						{{group.group}}
					</h6>
					@for (node of group.items; track node.item.taskName; let i = $index) {
						<div class="node-item" [class.selected]="selectedIndexes[group.group] === i"
							(click)="selectItem(node, group.group, i)">
							{{node.item.taskName}}
							@if (node.type === 'task') {
								<span class="badge bg-primary float-end">
									Task
								</span>
							}
							@if (node.type === 'output') {
								<span class="badge bg-warning float-end">
									Output
								</span>
							}
						</div>
					}
				</div>
			}
		</div>
	</div>
}
