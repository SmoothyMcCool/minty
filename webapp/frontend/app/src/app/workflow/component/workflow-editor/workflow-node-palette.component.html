<div class="node-palette-backdrop" *ngIf="visible" (click)="closed.emit()">
</div>

<div class="node-palette" *ngIf="visible" (keydown)="onKeyDown($event)">

	<input class="form-control mb-2" placeholder="Search nodes..." [(ngModel)]="search"
		(ngModelChange)="onSearchChange()" autofocus>

	<div class="node-list">

		<div *ngFor="let group of groupedNodes">

			<h6 class="mt-3 border-bottom pb-1">
				{{group.group}}
			</h6>

			<div class="node-item"  [class.selected]="selectedIndexes[group.group] === i" *ngFor="let node of group.items; let i = index" (click)="selectItem(node, group.group, i)">
				{{node.item.taskName}}
				<span class="badge bg-primary float-end" *ngIf="node.type === 'task'">
					Task
				</span>
				<span class="badge bg-warning float-end" *ngIf="node.type === 'output'">
					Output
				</span>
			</div>

		</div>

	</div>

</div>
