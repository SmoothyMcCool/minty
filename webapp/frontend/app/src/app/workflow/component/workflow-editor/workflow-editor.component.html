<form *ngIf="workflow">
	<div class="row mb-2">
		<label for="workflowNameInput" class="col-2 col-form-label">Name</label>
		<div class="col-10">
			<input id="workflowNameInput" name="workflowNameInput" type="text" size="10" maxlength="50"
				class="form-control" [ngModel]="workflow.name" (ngModelChange)="onNamedChanged($event)"
				autocomplete="off" required>
		</div>
	</div>
	<div class="row mb-2">
		<label for="description" class="col-2 col-form-label">Description</label>
		<div class="col-10">
			<textarea autoResize id="description" name="description" type="text" style="height: 100px;"
				class="form-control" [ngModel]="workflow.description" (ngModelChange)="onDescriptionChanged($event)"
				autocomplete="off" required></textarea>
		</div>
	</div>
</form>

<minty-canvas class="flex-grow-1 d-flex flex-column min-height-0" (displayTask)="onDisplayTask($event)"
	(mouseMove)="onMouseMove($event)" (addStep)="onAddStepClicked($event)"></minty-canvas>

<!-- Task Editor -->
<minty-workflow-task-editor-modal *ngIf="editTask" [visible]="!!editTask" [(ngModel)]="editTask"
	[specification]="specFor(editTask)" (taskSaved)="doneEditingStep($event)"
	(taskDeleted)="onTaskDeleteRequest($event)" (cancel)="cancelEdit()">
</minty-workflow-task-editor-modal>

<!-- Palette -->
<minty-workflow-node-palette [visible]="addStepVisible" (taskSelected)="onTaskNodeSelected($event)"
	(outputTaskSelected)="onOutputNodeSelected($event)" (closed)="addStepVisible=false">
</minty-workflow-node-palette>

<minty-confirmation-dialog [title]="'Delete Step'" [message]="'Are you sure you want to delete this step?'"
	[visible]="confirmDeleteStepVisible" (confirm)="confirmDeleteStep()"
	(cancel)="confirmDeleteStepVisible = false"></minty-confirmation-dialog>
