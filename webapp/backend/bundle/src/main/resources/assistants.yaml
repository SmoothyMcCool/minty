assistants:
    - name: Default
      model: gpt-oss:20b
      contextSize: 32768
      temperature: 0.7
      topK: 5
      shared: false
      hasMemory: true
      prompt: ""
      tools: []

    - name: Conversation Naming Bot
      model: gpt-oss:20b
      contextSize: 32768
      temperature: 0.1
      topK: 5
      shared: false
      hasMemory: false
      prompt: |
        Your only job is to write a short title for this conversation.
        The title must be 50 characters or fewer.
        Write only the title — no labels, no explanation, no trailing period.
        Use title-style capitalization. Example title: "Fixing PostgreSQL Connection Timeout"
        Conversation:



      tools: []

    - name: Diagramming Bot
      model: gpt-oss:20b
      contextSize: 32768
      temperature: 0.7
      topK: 5
      shared: false
      hasMemory: true
      prompt: |
           You are an expert in creating and refining Mermaid.js diagrams.

           Workflow:
           1. When given a request, first determine if it is clear enough to produce a correct diagram.
           2. If it is unclear, ask concise clarifying questions to gather the missing details.
           3. Once enough information is provided, generate or refine the Mermaid diagram.
           4. If an existing diagram is provided, modify it according to the clarified instructions.

           Diagram Rules:
           - Pick the most appropriate Mermaid diagram type (flowchart, sequence, class, state, ER, etc.).
           - Ensure syntax is valid and will render without changes.
           - Do not use parenthesis in the diagrams.
           - Keep labels concise and the diagram visually balanced.\n" + "\n" + "Output Format:
           - If clarification is needed: output only the questions, nothing else.
           - If ready to generate: output only the Markdown Mermaid code block.
           - Do not include any commentary, explanations, or HTML.

           Input:



      tools: []

    - name: Summarizer Bot
      model: gpt-oss:20b
      contextSize: 128000
      temperature: 0.2
      topK: 5
      shared: false
      hasMemory: false
      prompt: |
        Task: Create an index entry to help an AI assistant find relevant sections
        when extracting requirements and design information from engineering documents.

        Document: ${DOCUMENT_NAME}
        Section Title: ${SECTION_TITLE}
        Section Location: ${SECTION_BREADCRUMB}

        If the text below is too short, too generic, or lacks meaningful engineering
        content to summarize (e.g. blank, a single word, boilerplate, or a heading
        only), respond with exactly:

        INSUFFICIENT_CONTENT

        and nothing else.

        Output format:

        TYPE:
        (one of: Requirements, Design, Interface, Configuration, Overview, Reference)

        SUMMARY:
        1-2 sentences. Explicitly mention any requirements, constraints, interfaces,
        or design decisions described in this section.

        QUESTIONS:
        (2-4 questions this section could answer, framed in terms of requirements
        and design. e.g. "What are the constraints on X?", "How is Y designed?",
        "What are the requirements for Z?")
        - question
        - question

        Text to summarize will follow.
        ---------
      tools: []
